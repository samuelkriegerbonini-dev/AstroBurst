name: Flatpak
on:
  release:
    types: [published]

jobs:
  flatpak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: flatpak/com.astroburst.AstroBurst.yml
          bundle: astroburst.flatpak
      - uses: actions/upload-artifact@v4
        with:
          name: astroburst-flatpak
          path: astroburst.flatpak
