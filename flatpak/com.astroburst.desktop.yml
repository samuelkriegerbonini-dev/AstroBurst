app-id: com.astroburst.desktop
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: astroburst

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=home:ro
  - --filesystem=xdg-documents
  - --filesystem=xdg-download
  - --env=WEBKIT_DISABLE_COMPOSITING_MODE=1

modules:
  - name: webkit2gtk
    buildsystem: simple
    build-commands:
      - echo "Using runtime webkit2gtk"
    sources: []

  - name: astroburst
    buildsystem: simple
    build-commands:
      - install -Dm755 astroburst -t /app/bin/
      - install -Dm644 com.astroburst.desktop.desktop -t /app/share/applications/
      - install -Dm644 com.astroburst.desktop.metainfo.xml -t /app/share/metainfo/
      - install -Dm644 icon-128.png /app/share/icons/hicolor/128x128/apps/com.astroburst.desktop.png
      - install -Dm644 icon-256.png /app/share/icons/hicolor/256x256/apps/com.astroburst.desktop.png
      - install -Dm644 icon-512.png /app/share/icons/hicolor/512x512/apps/com.astroburst.desktop.png
      - install -Dm644 icon.svg /app/share/icons/hicolor/scalable/apps/com.astroburst.desktop.svg
      - install -Dm644 com.astroburst.desktop.xml -t /app/share/mime/packages/
      - cp -r lib/ /app/lib/ || true
      - cp -r resources/ /app/share/astroburst/ || true
    sources:
      - type: archive
        url: https://github.com/samuelkriegerbonini-dev/AstroBurst/releases/download/v0.4.6/astroburst-0.4.6-linux-x86_64.tar.gz
        sha256: REPLACE_WITH_ACTUAL_SHA256
      - type: file
        path: com.astroburst.desktop.desktop
      - type: file
        path: com.astroburst.desktop.metainfo.xml
      - type: file
        path: icons/icon-128.png
      - type: file
        path: icons/icon-256.png
      - type: file
        path: icons/icon-512.png
      - type: file
        path: icons/icon.svg
      - type: file
        path: com.astroburst.desktop.xml
